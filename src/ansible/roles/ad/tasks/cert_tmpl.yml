# Certificate Template setup generated with Gemini assistance

- name: Setup Certificate Templates for Smart Card Authentication
  block:

  - name: Install ADCS Certificate Authority role
    win_feature:
      name: ADCS-Cert-Authority
      include_management_tools: yes
      state: present

  - name: Configure ADCS as Enterprise Root CA
    win_shell: |
      Install-AdcsCertificationAuthority -CAType EnterpriseRootCA `
        -CACommonName "ad-RootCA" `
        -KeyLength 2048 `
        -HashAlgorithmName SHA256 `
        -ValidityPeriod Years `
        -OverwriteExistingCAinDS `
        -OverwriteExistingDatabase `
        -ValidityPeriodUnits 10 -Force
    register: adcs_config
    args:
      executable: powershell.exe

  - name: Create temporary directory
    win_file:
      path: "{{ temp_dir }}"
      state: directory

  - name: Copy LDIF template files to server
    win_copy:
      src: "{{ item.file }}"
      dest: "{{ temp_dir }}\\{{ item.file }}"
    loop: "{{ templates }}"

  - name: Import Certificate Templates via LDIFDE
    win_shell: "ldifde -i -f .\\{{ item.file }}"
    args:
      chdir: "{{ temp_dir }}"
    loop: "{{ templates }}"
    ignore_errors: yes

