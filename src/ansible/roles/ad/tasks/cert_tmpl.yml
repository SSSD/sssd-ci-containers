  - name: Apply Security ACLs to Templates
    win_shell: |
      $configNC = (Get-ADRootDSE).configurationNamingContext
      $templateDN = "CN={{ item.name }},CN=Certificate Templates,CN=Public Key Services,CN=Services,$configNC"

      $sidUsers = (New-Object System.Security.Principal.NTAccount("Domain Users")).Translate([System.Security.Principal.SecurityIdentifier])
      $sidComps = (New-Object System.Security.Principal.NTAccount("Domain Computers")).Translate([System.Security.Principal.SecurityIdentifier])

      $acl = Get-Acl -Path "AD:$templateDN"

      # Define specific rights for Read and Enroll
      $rights = [System.DirectoryServices.ActiveDirectoryRights]::ReadProperty -bor [System.DirectoryServices.ActiveDirectoryRights]::ExtendedRight

      $type = [System.Security.AccessControl.AccessControlType]::Allow
      $inherit = [System.Security.AccessControl.InheritanceFlags]::ContainerInherit
      $guid = [Guid]::Empty

      # Enrollment Extended Right GUID: 0e10c968-78fb-11d2-90d4-00c04f79dc55
      $enrollGuid = [Guid]"0e10c968-78fb-11d2-90d4-00c04f79dc55"

      # Create rules using the Enrollment Extended Right GUID
      $uRule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($uSid, $rights, $type, $enrollGuid, $inherit, $guid)
      $cRule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($cSid, $rights, $type, $enrollGuid, $inherit, $guid)

      $acl.AddAccessRule($uRule)
      $acl.AddAccessRule($cRule)

      Set-Acl -Path "AD:$templateDN" -AclObject $acl
    loop: "{{ templates }}"

  - name: Publish Templates
    win_shell: "Add-CATemplate -Name {{ item.name }} -Force"
    loop: "{{ templates }}"
    register: publish_result
    until: publish_result is succeeded
    retries: 60
    delay: 15

  - name: Install OpenSSL using Win_Chocolatey
    win_chocolatey:
      name: openssl
      state: present

  become: yes
  become_method: runas
  become_user: Administrator
