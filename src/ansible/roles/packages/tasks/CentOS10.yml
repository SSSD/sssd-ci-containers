- name: Install buildroot repository
  block:
  - name: Install dnf plugins
    dnf:
      state: present
      name:
      - dnf-plugins-core

  - name: Install buildroot
    template:
      src: repo
      dest: '/etc/yum.repos.d/{{ item.name }}.repo'
      owner: root
      group: root
      mode: 0644
    with_items:
    - {name: 'buildroot', url: 'https://kojihub.stream.centos.org/kojifiles/repos/c10s-build/latest/$basearch'}
    when: buildroot


- name: Enable EPEL repo for virtual smart cards
  block:
  - name: Install dependent packages
    dnf:
      name: gnupg2
      state: present

  - name: Import EPEL key from a url
    rpm_key:
      state: present
      key:  https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-10

  - name: Install EPEL repositories
    dnf:
      name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
      state: present
  when: virt_smartcard

- name: 'Packages are the same as in Fedora'
  include_tasks: 'Fedora.yml'

- name: Enable EPEL for python3-koji when passkey testing
  block:
  - name: Import EPEL key from a url
    rpm_key:
      state: present
      key: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-10

  - name: Install EPEL repositories
    dnf:
      name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
      state: present
  when:
    - passkey_support
    - "'base_client' in group_names or 'client' in group_names"

- name: Install packages for usbip needed for virtual passkey testing
  dnf:
    state: present
    name:
    - gcc
    - make
    - automake
    - autoconf
    - systemd-devel
    - libtool
    - python3-koji
  when:
    - passkey_support
    - "'base_client' in group_names or 'client' in group_names"
