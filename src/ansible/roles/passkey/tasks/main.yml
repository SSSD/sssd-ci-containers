- name: Build random.so for passkey testing
  block:
  - name: Copy random.c to /opt
    copy:
      src: random.c
      dest: /opt/random.c
      owner: root
      group: root
      mode: 0644

  - name: Build random.so
    shell: |
      cd /opt
      gcc -fPIC -shared -o random.so random.c -lcrypto

  - name: Remove random.c
    file:
      path: /opt/random.c
      state: absent
  when: passkey_support

- name: Configure vfido wrapper for virtual-fido to support passkeys
  block:
  - name: Create test_venv/bin if missing
    file:
      path: "{{ test_venv }}/bin"
      state: directory

  - name: Install vfido.py wrapper for virtual-fido
    copy:
      src: vfido.py
      dest: "{{ test_venv }}/bin"
      owner: root
      group: root
      mode: 755

  - name: Install vfido_ wrapper scripts into /opt/test_venv
    copy:
      src: "{{ item }}"
      dest: "{{ test_venv }}/bin"
      owner: root
      group: root
      mode: 755
    with_fileglob:
      - "vfido_*"

  - name: Install vfido systemd service unit file
    copy:
      src: vfido.service
      dest: /etc/systemd/system

  - name: Start vfido service
    systemd_service:
      name: vfido
      daemon_reload: true
      state: started
    ignore_errors: yes

  - name: Clone virtual-fido to test_venv
    git:
      repo: "https://github.com/bulwarkid/virtual-fido.git"
      dest: "{{ test_venv }}/virtual-fido"
      version: 512d8a3fef0e073171a7ef3261f300e8a5e48694
      clone: yes
      update: yes
      depth: 1

  - name: Build vfido-demo binary once to avoid Go compiler fork limits
    command: go build -ldflags="-s -w" -o {{ test_venv }}/bin/vfido-demo ./cmd/demo
    args:
      chdir: "{{ test_venv }}/virtual-fido"
      creates: "{{ test_venv }}/bin/vfido-demo"

  when: passkey_support
